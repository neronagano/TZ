services:
  db:
    image: postgres:16-alpine
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-server}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      API_RELOAD: ${API_RELOAD:-false}
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+asyncpg://postgres:postgres@db:5432/server}
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    healthcheck:
      test: ["CMD", "python", "-c", "import os, socket; connection = socket.create_connection(('127.0.0.1', int(os.getenv('API_PORT', '8000'))), 2); connection.close()"]
      interval: 5s
      timeout: 5s
      retries: 10

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    env_file:
      - ./.env
    depends_on:
      server:
        condition: service_healthy
    environment:
      API_URL: ${API_URL_DOCKER:-http://server:8000}
      CLIENT_LOG_FILE: ${CLIENT_LOG_FILE_DOCKER:-/app/client/logs/client.log}
    volumes:
      - client_logs:/app/client/logs
    restart: "no"

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file:
      - ./.env
    depends_on:
      server:
        condition: service_healthy
    environment:
      WORKER_API_URL: ${WORKER_API_URL_DOCKER:-http://server:8000}
      WORKER_OUTPUT_FILE: ${WORKER_OUTPUT_FILE_DOCKER:-/app/worker/data/log_entries.jsonl}
    volumes:
      - worker_data:/app/worker/data
    restart: unless-stopped

volumes:
  postgres_data:
  client_logs:
  worker_data:
