services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-server}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      API_RELOAD: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST_DOCKER:-db}:${POSTGRES_PORT_DOCKER:-5432}/${POSTGRES_DB:-server}
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    healthcheck:
      test: ["CMD", "python", "-c", "import os, socket; connection = socket.create_connection(('127.0.0.1', int(os.getenv('API_PORT', '8000'))), 2); connection.close()"]
      interval: 5s
      timeout: 5s
      retries: 10

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-console}
      API_URL: ${CLIENT_API_URL:-http://server:8000}
      CLIENT_WORKERS: ${CLIENT_WORKERS:-5}
      CLIENT_MAX_DELAY_MS: ${CLIENT_MAX_DELAY_MS:-1000}
      CLIENT_REQUESTS_PER_WORKER: ${CLIENT_REQUESTS_PER_WORKER:-10}
      CLIENT_LOG_FILE: ${CLIENT_LOG_FILE_DOCKER:-/app/client/logs/client.log}
      CLIENT_REQUEST_TIMEOUT_SECONDS: ${CLIENT_REQUEST_TIMEOUT_SECONDS:-5}
      CLIENT_MAX_ATTEMPTS: ${CLIENT_MAX_ATTEMPTS:-3}
      CLIENT_RETRY_BACKOFF_MS: ${CLIENT_RETRY_BACKOFF_MS:-200}
    volumes:
      - client_logs:/app/client/logs
    restart: "no"

volumes:
  postgres_data:
  client_logs:
